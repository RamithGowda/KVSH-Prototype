<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KVSH — Payment Decision Engine</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a18; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .container { background: #fff; border-radius: 16px; border: 1px solid #e5e4dc; padding: 32px; width: 100%; max-width: 520px; }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .sub { font-size: 13px; color: #888; margin-bottom: 28px; }
    label { font-size: 13px; font-weight: 500; color: #555; display: block; margin-bottom: 6px; }
    select, input[type=number], input[type=text] { width: 100%; padding: 10px 12px; border: 1px solid #e0e0d8; border-radius: 8px; font-size: 14px; background: #fafaf8; color: #1a1a18; margin-bottom: 20px; outline: none; }
    select:focus, input:focus { border-color: #7f77dd; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    .card-check { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border: 1px solid #e5e4dc; border-radius: 8px; cursor: pointer; font-size: 12px; transition: all .15s; background: #fafaf8; }
    .card-check:hover { border-color: #7f77dd; background: #f0effe; }
    .card-check input { accent-color: #7f77dd; width: 14px; height: 14px; flex-shrink: 0; }
    .cap-section { margin-bottom: 20px; }
    .cap-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; }
    .cap-row span { min-width: 140px; color: #555; }
    .cap-row input { flex: 1; padding: 6px 10px; border: 1px solid #e0e0d8; border-radius: 6px; font-size: 13px; background: #fafaf8; color: #1a1a18; margin-bottom: 0; }
    button { width: 100%; padding: 13px; background: #7f77dd; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background .15s; }
    button:hover { background: #6a62c4; }
    button:active { transform: scale(0.99); }
    .result { margin-top: 24px; padding: 20px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 12px; display: none; }
    .result.low { background: #fffbeb; border-color: #fde68a; }
    .result.medium { background: #eff6ff; border-color: #bfdbfe; }
    .rec-line { font-size: 15px; font-weight: 600; color: #166534; margin-bottom: 8px; line-height: 1.5; }
    .result.low .rec-line { color: #92400e; }
    .result.medium .rec-line { color: #1e3a8a; }
    .confidence { font-size: 12px; color: #888; margin-bottom: 14px; }
    .fallback-title { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .fallback-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 8px 0; border-top: 1px solid #e5e4dc; gap: 8px; }
    .fallback-card { font-size: 13px; font-weight: 500; }
    .fallback-cashback { font-size: 13px; color: #16a34a; font-weight: 600; white-space: nowrap; }
    .fallback-note { font-size: 11px; color: #888; margin-top: 2px; }
    .error { margin-top: 16px; padding: 12px 16px; background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; font-size: 13px; color: #991b1b; display: none; }
    .hint { font-size: 11px; color: #aaa; margin-top: -16px; margin-bottom: 20px; }
  </style>
</head>
<body>
<div class="container">
  <h1>Payment Decision Engine</h1>
  <p class="sub">Which card should I use at checkout?</p>

  <div class="row">
    <div>
      <label>Merchant category</label>
      <select id="category">
        <option value="default">-- Unknown / Other</option>
        <option value="online">Online shopping</option>
        <option value="dining">Dining / Food delivery</option>
        <option value="grocery">Grocery</option>
        <option value="travel">Travel / Hotels</option>
        <option value="fuel">Fuel</option>
        <option value="utility">Utilities / Bills</option>
      </select>
    </div>
    <div>
      <label>Transaction amount (Rs.)</label>
      <input type="number" id="amount" placeholder="e.g. 2500" min="1"/>
    </div>
  </div>

  <label>Specific merchant (optional)</label>
  <input type="text" id="merchant" placeholder="e.g. amazon, swiggy, flipkart, zomato…"/>
  <p class="hint">If provided, merchant-specific rates will override category rates.</p>

  <label>Cards you hold</label>
  <div class="cards-grid">
    <label class="card-check"><input type="checkbox" value="hdfc_millennia" checked> HDFC Millennia</label>
    <label class="card-check"><input type="checkbox" value="axis_flipkart"> Axis Flipkart</label>
    <label class="card-check"><input type="checkbox" value="sbi_simplyclick"> SBI SimplyCLICK</label>
    <label class="card-check"><input type="checkbox" value="axis_magnus"> Axis Magnus</label>
    <label class="card-check"><input type="checkbox" value="amex_mrcc"> Amex MRCC</label>
    <label class="card-check"><input type="checkbox" value="hdfc_regalia"> HDFC Regalia</label>
    <label class="card-check"><input type="checkbox" value="icici_amazon_pay"> ICICI Amazon Pay</label>
    <label class="card-check"><input type="checkbox" value="hdfc_diners_black"> HDFC Diners Black</label>
    <label class="card-check"><input type="checkbox" value="indusind_nexxt"> IndusInd Nexxt</label>
    <label class="card-check"><input type="checkbox" value="sbi_cashback"> SBI Cashback</label>
  </div>

  <div class="cap-section" id="cap-section">
    <label>Monthly reward already used (optional)</label>
  </div>

  <button onclick="getRecommendation()">Recommend best card</button>

  <div class="error" id="error"></div>

  <div class="result" id="result">
    <div class="rec-line" id="rec-line"></div>
    <div class="confidence" id="confidence"></div>
    <div class="fallback-title">Full comparison</div>
    <div id="fallback"></div>
  </div>
</div>

<script>
  const CAP_CARDS = {
    hdfc_millennia:   "HDFC Millennia",
    sbi_simplyclick:  "SBI SimplyCLICK",
    amex_mrcc:        "Amex MRCC",
    axis_magnus:      "Axis Magnus",
    indusind_nexxt:   "IndusInd Nexxt",
    sbi_cashback:     "SBI Cashback",
  };

  function updateCapInputs() {
    const checked = [...document.querySelectorAll('.cards-grid input:checked')].map(i => i.value);
    const section = document.getElementById('cap-section');
    section.querySelectorAll('.cap-row').forEach(e => e.remove());
    checked.forEach(id => {
      if (CAP_CARDS[id]) {
        const row = document.createElement('div');
        row.className = 'cap-row';
        row.innerHTML = `<span>${CAP_CARDS[id]}</span><input type="number" id="cap_${id}" placeholder="Rs. used so far" min="0"/>`;
        section.appendChild(row);
      }
    });
  }

  document.querySelectorAll('.cards-grid input').forEach(cb => cb.addEventListener('change', updateCapInputs));
  updateCapInputs();

  async function getRecommendation() {
    const category = document.getElementById('category').value;
    const amount   = parseFloat(document.getElementById('amount').value);
    const merchant = document.getElementById('merchant').value.trim() || null;
    const cards    = [...document.querySelectorAll('.cards-grid input:checked')].map(i => i.value);
    const caps_used = {};
    cards.forEach(id => {
      const el = document.getElementById('cap_' + id);
      if (el && el.value) caps_used[id] = parseFloat(el.value);
    });

    const errEl = document.getElementById('error');
    errEl.style.display = 'none';

    if (!amount || amount <= 0) { errEl.textContent = 'Enter a valid amount'; errEl.style.display = 'block'; return; }
    if (!cards.length)          { errEl.textContent = 'Select at least one card'; errEl.style.display = 'block'; return; }

    const btn = document.querySelector('button');
    btn.textContent = 'Thinking…';
    btn.disabled = true;

    try {
      const res  = await fetch('/recommend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ category, amount, cards, caps_used, merchant })
      });
      const data = await res.json();

      if (data.error) { errEl.textContent = data.error; errEl.style.display = 'block'; return; }

      const resultEl = document.getElementById('result');
      const conf = data.confidence || '';
      resultEl.className = 'result ' + (conf.startsWith('low') ? 'low' : conf.startsWith('medium') ? 'medium' : '');
      document.getElementById('rec-line').textContent = data.recommendation;
      document.getElementById('confidence').textContent = 'Confidence: ' + data.confidence;

      const fb = document.getElementById('fallback');
      fb.innerHTML = (data.fallback_chain || []).map(c => `
        <div class="fallback-row">
          <div>
            <div class="fallback-card">${c.card}</div>
            <div class="fallback-note">${c.note}</div>
          </div>
          <div style="text-align:right">
            <div class="fallback-cashback">${c.cashback}</div>
            <div style="font-size:11px;color:#888">${c.rate}</div>
          </div>
        </div>`).join('');

      resultEl.style.display = 'block';
    } catch(e) {
      errEl.textContent = 'Server error — make sure the Flask app is running';
      errEl.style.display = 'block';
    } finally {
      btn.textContent = 'Recommend best card';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
